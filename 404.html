<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Page not found — Ibn Dalhat Technologies</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap');
:root{--navy:#0B1E3D;--teal:#12B8D6;--paper:#F8F9FB;--ink:#101827;--muted:#64748B;--line:#E7EAEE}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Manrope',sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
h1{font-family:'Sora',sans-serif;color:var(--navy);letter-spacing:-0.01em}
.wrap{max-width:480px;margin:0 auto;padding:80px 24px;text-align:center;flex:1}
.code{font-size:120px;font-weight:800;color:var(--teal);line-height:1;margin-bottom:16px}
h1{font-size:28px;margin-bottom:12px}
p{color:var(--muted);margin-bottom:28px}
.btn{display:inline-block;padding:13px 28px;background:var(--navy);color:#fff;border-radius:8px;font-weight:600;font-size:14px;transition:background .15s}
.btn:hover{background:var(--teal)}
footer{border-top:1px solid var(--line);padding:24px 0;text-align:center;font-size:13px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>Sorry, we couldn't find that page. It might have moved or doesn't exist.</p>
  <a href="/" class="btn">Back to home</a>
</div>
<footer>© 2026 Ibn Dalhat Technologies</footer>
</body>
</html>
